name: zhidu
description: "智读AI分层阅读器 - 通过AI分层解析，实现先读薄，再读厚的阅读体验"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # 文件处理
  epub_plus: ^5.1.0
  file_picker: ^6.1.1
  path_provider: ^2.1.1
  path: ^1.8.3
  archive: ^3.4.10
  image: ^4.3.0
  xml: ^6.5.0
  
  # UI组件
  flutter_html: ^3.0.0-beta.2
  markdown: ^7.2.1
  
  # 工具库
  uuid: ^4.2.1
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  
  # 网络请求
  http: ^1.1.0
  
  # PDF处理
  pdfrx: ^1.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.8
  pdf: ^3.10.7

flutter:
  uses-material-design: true
  generate: true

flutter_intl:
  enabled: true
  arb_dir: lib/l10n
  template_arb_file: app_zh.arb
  output_dir: lib/l10n/generated
